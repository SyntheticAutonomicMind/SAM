name: Update Appcast

# Runs after Release SAM succeeds. Checks out main fresh (not the tag),
# so there is no race between the ~10-minute build and developer pushes.
# The ZIP is already in the GitHub Release at this point - we just sign
# it and commit the appcast entry.
on:
  workflow_run:
    workflows: ["Release SAM"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update appcast for (e.g., 20260315.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-appcast:
    name: Update appcast.xml
    runs-on: [self-hosted]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$HEAD_BRANCH"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Updating appcast for version: $VERSION"

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dist
          gh release download "${VERSION}" \
            --pattern "SAM-${VERSION}.zip" \
            --pattern "SAM-${VERSION}.zip.sig" \
            --dir dist
          ls -lh dist/SAM-${VERSION}.*

      - name: Update appcast.xml
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          SIG=$(cat "dist/SAM-${VERSION}.zip.sig")
          ./scripts/update_appcast.sh "${VERSION}" "dist/SAM-${VERSION}.zip" --signature "$SIG"

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add appcast.xml
          if git diff --staged --quiet; then
            echo "No changes to appcast.xml"
          else
            git commit -m "chore(release): update appcast.xml for v${VERSION}"
            git push origin main
          fi
